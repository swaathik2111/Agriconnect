<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AgriConnect – Farm to Consumer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#0a1509;font-family:'Sora',sans-serif;display:flex;justify-content:center;align-items:flex-start}
input,button,textarea{font-family:'Sora',sans-serif;outline:none}
button{cursor:pointer}
:root{
  --bg:#0d1a0c;--bg2:#111e10;--surface:#141f13;--surface2:#1a2a18;--surface3:#1e3019;
  --border:#243d21;--border2:#2e4d2a;--green:#4a9e3f;--green2:#2ecc71;
  --greenLight:#8aad78;--greenDim:#4d6640;--text:#d4e8c0;--textMuted:#8aad78;
  --gold:#d4a200;--goldLight:#f0c040;--red:#e74c3c;--blue:#3498db;--orange:#e67e22;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--r99:99px;
}
#app{width:100%;max-width:480px;height:100vh;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative;box-shadow:0 0 80px #000a;}
#main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px 100px;scroll-behavior:smooth;}
#main-scroll::-webkit-scrollbar{width:3px}
#main-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:var(--r99)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes ripple{0%{transform:scale(.7);opacity:.9}100%{transform:scale(2.5);opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes notifSlide{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
#offline-banner{padding:7px 16px;text-align:center;font-size:11px;font-weight:700;border-bottom:1px solid;display:none;transition:all .3s;}
#offline-banner.show-offline{display:block;background:#c0392b18;border-color:#c0392b60;color:var(--red)}
#offline-banner.show-syncing{display:block;background:#d4a20015;border-color:#d4a20050;color:var(--goldLight)}
#header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:center;gap:7px}
.logo-icon{font-size:22px;line-height:1}
.logo-text{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.conn-badge{display:flex;align-items:center;gap:4px;border-radius:var(--r99);padding:3px 9px;font-size:10px;font-weight:700;color:#fff;transition:background .4s;}
.conn-badge.online{background:#27ae60}.conn-badge.offline{background:var(--red)}.conn-badge.syncing{background:#b8860b}
.conn-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r8);padding:6px 11px;color:var(--text);font-size:13px;font-weight:700;transition:all .2s;display:flex;align-items:center;gap:4px;}
.icon-btn:hover{background:var(--surface3)}
.cart-wrap{position:relative}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:50%;width:17px;height:17px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}
.switch-btn{background:rgba(74,158,63,.18);border:1px solid rgba(74,158,63,.35);border-radius:var(--r8);padding:6px 11px;font-size:17px;transition:all .2s;}
.switch-btn:hover{background:rgba(74,158,63,.3)}
#view-label{padding:9px 16px 0;background:var(--bg);flex-shrink:0;}
.view-label-text{font-size:13px;font-weight:700;color:var(--text)}
.view-label-sub{font-size:11px;color:var(--greenDim);margin-top:1px}
#toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.4);backdrop-filter:blur(10px);border-radius:var(--r12);padding:10px 20px;color:var(--green2);font-size:12px;font-weight:700;z-index:999;white-space:nowrap;display:none;animation:notifSlide .3s ease;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:13px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .2s,box-shadow .2s;}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px #0005}
.stat-emoji{font-size:22px}.stat-value{font-size:16px;font-weight:800}.stat-label{font-size:9px;color:var(--textMuted);text-align:center;line-height:1.3}.stat-sub{font-size:9px;color:var(--greenDim)}
.earnings-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
.earnings-bar-header{display:flex;justify-content:space-between;margin-bottom:8px}
.earnings-bar-title{font-size:12px;font-weight:600;color:var(--textMuted)}.earnings-pct{font-size:12px;font-weight:800;color:var(--gold)}
.progress-track{background:var(--surface2);border-radius:var(--r99);height:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:var(--r99);background:linear-gradient(90deg,var(--green),var(--goldLight));transition:width 1.2s cubic-bezier(.22,1,.36,1);width:0;}
.earnings-footer{display:flex;justify-content:space-between;margin-top:6px}.earnings-footer span{font-size:11px;color:var(--greenDim)}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
.chart-title{font-size:12px;font-weight:600;color:var(--textMuted);margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:60px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{width:100%;border-radius:4px 4px 0 0;background:var(--green);opacity:.6;transition:all .3s;}
.chart-bar.today{opacity:1;background:linear-gradient(180deg,var(--goldLight),var(--green))}.chart-bar:hover{opacity:1}
.chart-day{font-size:9px;color:var(--greenDim);font-weight:600}
.voice-section{display:flex;justify-content:center;margin-bottom:20px;position:relative}
.voice-btn{background:var(--surface);border:2px solid var(--border);border-radius:var(--r99);padding:14px 36px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .3s;position:relative;z-index:2;}
.voice-btn.active{background:rgba(74,158,63,.15);border-color:var(--green);box-shadow:0 0 28px rgba(74,158,63,.35);}
.voice-icon{font-size:30px;transition:all .3s}.voice-label{font-size:10px;font-weight:700;color:var(--textMuted);letter-spacing:.5px}
.voice-ripple{position:absolute;width:80px;height:80px;border-radius:50%;border:2px solid var(--green);top:50%;left:50%;transform:translate(-50%,-50%);animation:ripple 1.3s infinite;z-index:1;}
.voice-ripple2{animation-delay:.45s}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:4px;}
.section-title{font-size:15px;font-weight:800;color:var(--text)}.section-sub{font-size:11px;color:var(--greenDim)}
.add-btn{background:rgba(74,158,63,.18);border:1px solid rgba(74,158,63,.4);border-radius:var(--r8);padding:5px 13px;color:var(--green);font-size:12px;font-weight:700;transition:all .2s;}
.add-btn:hover{background:rgba(74,158,63,.3)}
.product-list{display:flex;flex-direction:column;gap:10px}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px;display:flex;gap:13px;align-items:flex-start;transition:transform .2s,box-shadow .2s;}
.product-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px #0005}
.product-emoji-box{border-radius:12px;width:58px;height:58px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;}
.product-info{flex:1;display:flex;flex-direction:column;gap:5px}
.product-name{font-size:15px;font-weight:700;color:var(--text)}
.product-meta{display:flex;justify-content:space-between;align-items:center}
.stock-badge{border-radius:var(--r99);padding:2px 9px;font-size:10px;font-weight:700}
.stock-in{background:rgba(39,174,96,.18);color:#27ae60}.stock-low{background:rgba(230,126,34,.18);color:#e67e22}
.product-price{font-size:13px;font-weight:800;color:var(--gold)}
.mini-track{background:var(--surface2);border-radius:var(--r99);height:4px;overflow:hidden;margin-top:2px}
.mini-fill{height:100%;border-radius:var(--r99);transition:width 1s;}
.prod-stats{display:flex;gap:12px}.prod-stat{font-size:11px;color:var(--greenDim)}
.prod-actions{display:flex;gap:6px;margin-top:4px}
.prod-action-btn{flex:1;border-radius:var(--r8);padding:5px 0;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--surface2);color:var(--textMuted);transition:all .2s;}
.prod-action-btn.edit{border-color:rgba(52,152,219,.4);color:var(--blue)}.prod-action-btn.pause{border-color:rgba(230,126,34,.4);color:var(--orange)}
.search-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px;transition:border-color .2s;}
.search-bar:focus-within{border-color:var(--green)}
.search-input{flex:1;background:none;border:none;font-size:13px;color:var(--text);}.search-input::placeholder{color:var(--greenDim)}
.search-clear{background:none;border:none;color:var(--greenDim);font-size:14px;padding:0 2px}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}.filter-row::-webkit-scrollbar{display:none}
.filter-pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--r99);padding:6px 14px;font-size:11px;font-weight:700;color:var(--textMuted);white-space:nowrap;transition:all .2s;}
.filter-pill.active{background:rgba(74,158,63,.2);border-color:var(--green);color:var(--green);}.filter-pill:hover:not(.active){background:var(--surface2)}
.hero-banner{background:linear-gradient(135deg,#192e14,#1e3d17,#243a1a);border:1px solid rgba(74,158,63,.4);border-radius:18px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:relative;overflow:hidden;}
.hero-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(74,158,63,.15),transparent 70%);}
.hero-inner{display:flex;align-items:center;gap:12px;position:relative}
.hero-title{font-size:18px;font-weight:800;color:var(--text);line-height:1.2}.hero-sub{font-size:11px;color:var(--greenLight);margin-top:3px;font-weight:500}
.hero-emojis{font-size:42px;opacity:.5;position:relative}
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.market-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative;transition:transform .2s,box-shadow .2s;}
.market-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px #0005}
.fresh-badge{position:absolute;top:8px;left:8px;background:var(--green);color:#fff;border-radius:var(--r99);padding:2px 8px;font-size:9px;font-weight:800;z-index:2;}
.organic-badge{position:absolute;top:8px;right:8px;background:rgba(52,152,219,.25);color:var(--blue);border-radius:var(--r99);padding:2px 8px;font-size:9px;font-weight:800;z-index:2;}
.market-emoji-box{display:flex;justify-content:center;align-items:center;padding:20px 0 10px;background:var(--surface2);font-size:46px;cursor:pointer;}
.market-body{padding:10px 12px 13px;display:flex;flex-direction:column;gap:3px}
.market-name{font-size:14px;font-weight:800;color:var(--text)}.market-farm{font-size:10px;color:var(--greenDim);margin-top:1px}
.market-price-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.market-price{font-size:17px;font-weight:800;color:var(--gold)}.market-price span{font-size:10px;color:var(--textMuted);font-weight:400}
.add-cart-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r8);padding:5px 10px;font-size:11px;font-weight:800;color:var(--text);transition:all .2s;}
.add-cart-btn:hover{background:var(--surface3)}.add-cart-btn.in-cart{background:rgba(39,174,96,.2);border-color:var(--green2);color:var(--green2);}
.farm-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;transition:transform .2s,box-shadow .2s;}
.farm-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px #0005}
.farm-card-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.farm-emoji-box{background:var(--surface2);border-radius:12px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.farm-info{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.farm-name{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:5px}
.verified-badge{background:rgba(52,152,219,.2);color:var(--blue);border-radius:var(--r99);padding:1px 6px;font-size:10px;font-weight:800;}
.farm-loc{font-size:11px;color:var(--greenDim)}.farm-rating{font-size:11px;color:var(--gold);font-weight:600}.farm-subs{font-size:10px;color:var(--greenDim);margin-top:1px}
.sub-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r99);padding:7px 13px;font-size:11px;font-weight:800;color:var(--text);white-space:nowrap;flex-shrink:0;transition:all .2s;}
.sub-btn.active{background:rgba(39,174,96,.2);border-color:var(--green2);color:var(--green2);}.sub-btn:hover:not(.active){background:var(--surface3)}
.farm-products{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}.farm-prod-emoji{font-size:20px}
.farm-tags{display:flex;gap:6px;flex-wrap:wrap}
.farm-tag{background:rgba(74,158,63,.12);border:1px solid rgba(74,158,63,.25);border-radius:var(--r99);padding:2px 9px;font-size:10px;font-weight:700;color:var(--green);}
.cart-empty{text-align:center;padding:64px 16px;color:var(--greenDim)}.cart-empty-icon{font-size:60px;margin-bottom:12px}.cart-empty-text{font-size:14px;font-weight:600}
.cart-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.cart-item-emoji{font-size:30px}.cart-item-info{flex:1}.cart-item-name{font-size:14px;font-weight:700;color:var(--text)}.cart-item-sub{font-size:11px;color:var(--greenDim)}.cart-item-price{font-size:15px;font-weight:800;color:var(--gold)}
.cart-item-qty{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--r8);padding:4px;}
.qty-btn{width:24px;height:24px;border-radius:var(--r8);background:var(--surface3);border:1px solid var(--border2);color:var(--text);font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.qty-num{font-size:13px;font-weight:800;color:var(--text);min-width:20px;text-align:center}
.cart-total{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin:12px 0;}
.cart-total-label{font-size:13px;color:var(--textMuted);font-weight:600}.cart-total-val{font-size:22px;font-weight:800;color:var(--gold)}
.checkout-btn{width:100%;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;color:#fff;letter-spacing:.3px;transition:all .2s;box-shadow:0 6px 20px rgba(46,204,113,.25);}
.checkout-btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(46,204,113,.35)}.checkout-btn:active{transform:scale(.98)}
#bottom-nav{display:flex;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;background:none;border:none;color:var(--greenDim);transition:all .2s;gap:2px;position:relative;}
.nav-tab.active{color:var(--green);background:rgba(74,158,63,.08)}.nav-tab.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--green);border-radius:0 0 2px 2px;}
.nav-tab-icon{font-size:22px}.nav-tab-label{font-size:10px;font-weight:700}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;}
#modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;align-items:flex-end;justify-content:center;}
#modal-overlay.open{display:flex}
#qty-modal{background:var(--surface);border-radius:24px 24px 0 0;padding:22px 18px 30px;width:100%;max-width:480px;position:relative;border-top:1px solid var(--border);animation:slideUp .3s cubic-bezier(.22,1,.36,1);}
.modal-drag{width:40px;height:4px;background:var(--border2);border-radius:var(--r99);margin:0 auto 18px}
.modal-header{display:flex;gap:14px;align-items:center;margin-bottom:18px}
.modal-emoji{font-size:46px}.modal-item-name{font-size:18px;font-weight:800;color:var(--text)}.modal-item-farm{font-size:12px;color:var(--greenDim);margin-top:2px}.modal-item-price{font-size:13px;font-weight:700;color:var(--gold);margin-top:2px}
.modal-section-title{font-size:12px;font-weight:700;color:var(--textMuted);margin-bottom:12px}
.qty-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
.qty-card{background:var(--surface2);border:2px solid var(--border);border-radius:14px;padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;cursor:pointer;}
.qty-card.selected{background:rgba(74,158,63,.18);border-color:var(--green)}
.qty-card-icon{font-size:26px}.qty-card-label{font-size:12px;font-weight:800;color:var(--text)}.qty-card-amount{font-size:11px;color:var(--textMuted)}.qty-card-price{font-size:14px;font-weight:800;color:var(--gold)}
.modal-confirm-btn{width:100%;background:linear-gradient(135deg,var(--green),var(--green2));border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:800;color:#fff;transition:all .2s;opacity:.4;pointer-events:none;cursor:pointer;}
.modal-confirm-btn.ready{opacity:1;pointer-events:auto}.modal-confirm-btn:hover{transform:translateY(-1px)}
#modal-close{position:absolute;top:18px;right:16px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;font-size:14px;color:var(--textMuted);display:flex;align-items:center;justify-content:center;}
.empty-state{text-align:center;padding:48px 16px;color:var(--greenDim);grid-column:1/-1}
.empty-state-icon{font-size:52px;margin-bottom:10px}.empty-state-text{font-size:13px;font-weight:600}
.farmer-profile{background:linear-gradient(135deg,#162a13,#1e3819);border:1px solid rgba(74,158,63,.3);border-radius:16px;padding:16px;display:flex;gap:14px;align-items:center;margin-bottom:14px;}
.farmer-avatar{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--green2));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.farmer-name{font-size:16px;font-weight:800;color:var(--text)}.farmer-loc{font-size:11px;color:var(--greenDim);margin-top:2px}
.farmer-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.f-badge{border-radius:var(--r99);padding:2px 8px;font-size:9px;font-weight:800}
.f-badge-v{background:rgba(52,152,219,.2);color:var(--blue)}.f-badge-o{background:rgba(74,158,63,.2);color:var(--green)}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.quick-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px;display:flex;align-items:center;gap:10px;transition:all .2s;text-align:left;}
.quick-btn:hover{background:var(--surface2);transform:translateY(-1px)}
.quick-btn-icon{font-size:24px}.quick-btn-text{font-size:12px;font-weight:700;color:var(--text)}.quick-btn-sub{font-size:10px;color:var(--greenDim);margin-top:1px}
.analytics-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.analytics-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px;}
.analytics-label{font-size:10px;color:var(--textMuted);font-weight:600;margin-bottom:6px}
.analytics-value{font-size:18px;font-weight:800;color:var(--text)}
.analytics-change{font-size:10px;font-weight:700;margin-top:3px}.analytics-change.up{color:#27ae60}.analytics-change.down{color:var(--red)}

<body>
<div id="app">
  <div id="offline-banner"></div>
  <div id="header">
    <div class="header-left">
      <div class="logo"><span class="logo-icon">🌿</span><span class="logo-text" id="logo-text">AgriConnect</span></div>
      <div class="conn-badge online" id="conn-badge"><div class="conn-dot"></div><span id="conn-label">Live</span></div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="toggleLang()" id="lang-btn">த</button>
      <div class="cart-wrap" id="cart-wrap" style="display:none">
        <button class="icon-btn" onclick="showTab('cart')" style="font-size:18px">🛒<span class="cart-badge" id="cart-badge" style="display:none">0</span></button>
      </div>
      <button class="switch-btn" onclick="switchView()" id="switch-btn">🛍️</button>
    </div>
  </div>
  <div id="view-label">
    <div class="view-label-text" id="view-label-text">🌾 Farmer — Ravi's Farm</div>
    <div class="view-label-sub" id="view-label-sub">Salem, Tamil Nadu</div>
  </div>
  <div id="toast"></div>
  <div id="main-scroll"><div id="content"></div></div>
  <div id="bottom-nav" style="display:none">
    <button class="nav-tab active" onclick="showTab('explore')" id="nav-explore"><span class="nav-tab-icon">🏠</span><span class="nav-tab-label">Explore</span></button>
    <button class="nav-tab" onclick="showTab('farms')" id="nav-farms"><span class="nav-tab-icon">🌾</span><span class="nav-tab-label">Farms</span></button>
    <button class="nav-tab" onclick="showTab('cart')" id="nav-cart"><span class="nav-tab-icon">🛒</span><span class="nav-tab-label">Cart</span><span class="nav-badge" id="nav-cart-badge" style="display:none">0</span></button>
  </div>
  <div id="modal-overlay" onclick="closeModal(event)">
    <div id="qty-modal">
      <div class="modal-drag"></div>
      <button id="modal-close" onclick="closeQtyModal()">✕</button>
      <div class="modal-header">
        <span class="modal-emoji" id="modal-emoji">🍅</span>
        <div><div class="modal-item-name" id="modal-name"></div><div class="modal-item-farm" id="modal-farm"></div><div class="modal-item-price" id="modal-base-price"></div></div>
      </div>
      <div class="modal-section-title" id="modal-qty-title">Choose Quantity</div>
      <div class="qty-grid" id="qty-grid"></div>
      <button class="modal-confirm-btn" id="modal-confirm" onclick="confirmAdd()">+ Add to Cart</button>
    </div>
  </div>
</div>
<script>
const T={en:{appName:"AgriConnect",tagline:"Farm to Your Table",farmerDash:"My Farm",marketplace:"Marketplace",offline:"Offline",online:"Live",syncing:"Syncing…",myListings:"My Listings",addProduct:"Add Product",totalEarnings:"This Week",ordersToday:"Orders Today",voiceInput:"Speak",tapToSpeak:"Tap & Speak",listening:"Listening…",tomatoes:"Tomatoes",bananas:"Bananas",spinach:"Spinach",rice:"Rice",onions:"Onions",mangoes:"Mangoes",nearbyFarms:"Nearby Farms",subscribe:"Subscribe",subscribed:"Subscribed ✓",cart:"Cart",explore:"Explore",searchHint:"Search farms or crops…",organic:"Organic",fresh:"Fresh Today",localFarm:"Local Farm",delivery:"Delivery",addToCart:"Add",all:"All",vegetables:"Veggies",fruits:"Fruits",grains:"Grains",hello:"Hello",farmer:"Farmer",consumer:"Shopper",sold:"Sold",inStock:"In Stock",lowStock:"Low Stock",weeklyTarget:"Weekly Target",farmName:"Ravi's Farm",location:"Salem, Tamil Nadu",rating:"Rating",km:"km away",chooseQty:"Choose Quantity",bag:"Bag",crate:"Crate",bundle:"Bundle",offlineBanner:"No internet — data saved locally",lastSync:"Last sync: 2 min ago",weeklyEarnings:"Weekly Earnings",analytics:"Analytics",noResults:"No items found",editListing:"Edit",pauseListing:"Pause",total:"Order Total",placeOrder:"Place Order",emptyCart:"Your cart is empty",addItemsHint:"Browse the marketplace and add fresh produce!",verifiedFarm:"Verified",quickActions:"Quick Actions",addNewProduct:"Add Product",viewOrders:"View Orders",updatePrices:"Update Prices",downloadReport:"Report",trending:"Trending",perKg:"/kg"},ta:{appName:"அக்ரிகனெக்ட்",tagline:"பண்ணையிலிருந்து உங்கள் மேசைக்கு",farmerDash:"என் பண்ணை",marketplace:"சந்தை",offline:"ஆஃப்லைன்",online:"நேரடி",syncing:"ஒத்திசைக்கிறது…",myListings:"என் பட்டியல்",addProduct:"பொருள் சேர்",totalEarnings:"இந்த வாரம்",ordersToday:"இன்று ஆர்டர்",voiceInput:"பேசு",tapToSpeak:"தட்டி பேசு",listening:"கேட்கிறேன்…",tomatoes:"தக்காளி",bananas:"வாழைப்பழம்",spinach:"கீரை",rice:"அரிசி",onions:"வெங்காயம்",mangoes:"மாம்பழம்",nearbyFarms:"அருகில் பண்ணைகள்",subscribe:"சந்தா செய்",subscribed:"சந்தா ✓",cart:"கூடை",explore:"தேடு",searchHint:"பண்ணை அல்லது பயிர் தேடு…",organic:"இயற்கை",fresh:"இன்று புதியது",localFarm:"உள்ளூர் பண்ணை",delivery:"டெலிவரி",addToCart:"சேர்",all:"அனைத்தும்",vegetables:"காய்கறி",fruits:"பழங்கள்",grains:"தானியங்கள்",hello:"வணக்கம்",farmer:"விவசாயி",consumer:"வாங்குபவர்",sold:"விற்றது",inStock:"கையிருப்பு",lowStock:"குறைவான இருப்பு",weeklyTarget:"வாராந்திர இலக்கு",farmName:"ரவியின் பண்ணை",location:"சேலம், தமிழ்நாடு",rating:"மதிப்பீடு",km:"கி.மீ தொலைவில்",chooseQty:"அளவு தேர்ந்தெடு",bag:"பை",crate:"கூடை",bundle:"கட்டு",offlineBanner:"இணையம் இல்லை — தரவு சேமிக்கப்பட்டது",lastSync:"கடைசி: 2 நிமிடம் முன்",weeklyEarnings:"வாராந்திர வருமானம்",analytics:"பகுப்பாய்வு",noResults:"பொருள் இல்லை",editListing:"திருத்து",pauseListing:"நிறுத்து",total:"மொத்தம்",placeOrder:"ஆர்டர் செய்",emptyCart:"கூடை காலியாக உள்ளது",addItemsHint:"சந்தையில் தேடி பொருட்கள் சேர்க்கவும்!",verifiedFarm:"சரிபார்க்கப்பட்டது",quickActions:"விரைவு செயல்கள்",addNewProduct:"பொருள் சேர்",viewOrders:"ஆர்டர்கள்",updatePrices:"விலை புதுப்பி",downloadReport:"அறிக்கை",trending:"பிரபலம்",perKg:"/கிலோ"}};
const farmerProducts=[{id:1,emoji:"🍅",nameKey:"tomatoes",price:28,stock:80,unit:"kg",status:"inStock",sold:120,color:"#e74c3c",organic:true},{id:2,emoji:"🍌",nameKey:"bananas",price:35,stock:15,unit:"doz",status:"lowStock",sold:48,color:"#f0c040",organic:false},{id:3,emoji:"🥬",nameKey:"spinach",price:20,stock:60,unit:"kg",status:"inStock",sold:90,color:"#27ae60",organic:true},{id:4,emoji:"🌾",nameKey:"rice",price:42,stock:200,unit:"kg",status:"inStock",sold:310,color:"#c8a04a",organic:false},{id:5,emoji:"🧅",nameKey:"onions",price:18,stock:8,unit:"kg",status:"lowStock",sold:65,color:"#9b59b6",organic:false},{id:6,emoji:"🥭",nameKey:"mangoes",price:65,stock:45,unit:"kg",status:"inStock",sold:200,color:"#e67e22",organic:true}];
const farms=[{id:1,name:"Ravi's Organic Farm",location:"Salem",dist:3.2,rating:4.8,tags:["organic","fresh"],emoji:"🌿",products:["🍅","🧅","🥬"],verified:true,subscribers:142},{id:2,name:"Meena Harvest Fields",location:"Erode",dist:7.5,rating:4.6,tags:["fresh"],emoji:"🌾",products:["🌾","🥭","🍌"],verified:true,subscribers:89},{id:3,name:"Sundar's Garden",location:"Namakkal",dist:12.1,rating:4.5,tags:["local"],emoji:"🏡",products:["🥬","🍅","🧅"],verified:false,subscribers:53},{id:4,name:"Green Valley Co-op",location:"Coimbatore",dist:18.4,rating:4.9,tags:["organic","fresh"],emoji:"🌱",products:["🌾","🍅","🥭"],verified:true,subscribers:301}];
const marketItems=[{id:1,emoji:"🍅",nameKey:"tomatoes",farm:"Ravi's Farm",price:28,category:"vegetables",freshBadge:true,organic:true},{id:2,emoji:"🥭",nameKey:"mangoes",farm:"Meena Harvest",price:65,category:"fruits",freshBadge:true,organic:true},{id:3,emoji:"🌾",nameKey:"rice",farm:"Sundar's Garden",price:42,category:"grains",freshBadge:false,organic:false},{id:4,emoji:"🥬",nameKey:"spinach",farm:"Green Valley",price:20,category:"vegetables",freshBadge:true,organic:true},{id:5,emoji:"🍌",nameKey:"bananas",farm:"Meena Harvest",price:35,category:"fruits",freshBadge:false,organic:false},{id:6,emoji:"🧅",nameKey:"onions",farm:"Ravi's Farm",price:18,category:"vegetables",freshBadge:false,organic:false}];
const weeklyData=[520,680,490,820,750,910,430];
const weekDays=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
let lang="en",view="farmer",activeTab="explore",connectivity="online",listening=false,subscribed={},cart={},filterCat="all",searchQ="",selectedQtyKey=null,modalItem=null,voiceTimer=null;
function t(k){return T[lang][k]||k;}
setTimeout(()=>setConn("syncing"),5000);setTimeout(()=>setConn("online"),8000);
function setConn(s){connectivity=s;const b=document.getElementById('conn-badge'),l=document.getElementById('conn-label'),bn=document.getElementById('offline-banner');b.className='conn-badge '+s;l.textContent=s==='online'?t('online'):s==='syncing'?'…':t('offline');if(s==='offline'){bn.textContent='⚡ '+t('offlineBanner');bn.className='show-offline';}else if(s==='syncing'){bn.textContent='⟳ '+t('syncing')+' · '+t('lastSync');bn.className='show-syncing';}else bn.className='';}
let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='notifSlide .3s ease';clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.display='none';},2200);}
function toggleLang(){lang=lang==='en'?'ta':'en';document.getElementById('lang-btn').textContent=lang==='en'?'த':'EN';document.getElementById('logo-text').textContent=t('appName');updateViewLabel();render();}
function switchView(){view=view==='farmer'?'consumer':'farmer';activeTab='explore';filterCat='all';searchQ='';document.getElementById('switch-btn').textContent=view==='farmer'?'🛍️':'🌾';document.getElementById('bottom-nav').style.display=view==='consumer'?'flex':'none';document.getElementById('cart-wrap').style.display=view==='consumer'?'block':'none';updateViewLabel();render();}
function updateViewLabel(){const tx=document.getElementById('view-label-text'),sb=document.getElementById('view-label-sub');if(view==='farmer'){tx.textContent=`🌾 ${t('farmer')} — ${t('farmName')}`;sb.textContent=t('location');}else{tx.textContent=`🛍️ ${t('consumer')} — ${t('hello')}!`;sb.textContent=t('tagline');}}
function showTab(tab){activeTab=tab;['explore','farms','cart'].forEach(k=>{document.getElementById('nav-'+k).classList.toggle('active',k===tab);});render();}
function updateNavBadge(){const c=cartTotal(),b=document.getElementById('nav-cart-badge'),hb=document.getElementById('cart-badge');if(c>0){b.style.display='flex';b.textContent=c;hb.style.display='flex';hb.textContent=c;}else{b.style.display='none';hb.style.display='none';}}
function cartTotal(){return Object.values(cart).reduce((a,b)=>a+b,0);}
function cartValue(){return Object.entries(cart).reduce((s,[id,qty])=>{const item=marketItems.find(i=>i.id===parseInt(id));return s+(item?item.price*qty:0);},0);}
function toggleVoice(){if(listening){clearTimeout(voiceTimer);setListening(false);return;}setListening(true);voiceTimer=setTimeout(()=>{setListening(false);showToast('🎙️ Price updated: ₹32/kg');},2800);}
function setListening(s){listening=s;const btn=document.getElementById('voice-btn'),icon=document.getElementById('voice-icon'),label=document.getElementById('voice-label'),ripples=document.querySelectorAll('.voice-ripple');if(!btn)return;btn.classList.toggle('active',s);icon.textContent=s?'🎙️':'🎤';label.textContent=s?t('listening'):t('tapToSpeak');ripples.forEach(r=>r.style.display=s?'block':'none');}
function openQtyModal(itemId){const item=marketItems.find(i=>i.id===itemId);if(!item)return;modalItem=item;selectedQtyKey=null;document.getElementById('modal-emoji').textContent=item.emoji;document.getElementById('modal-name').textContent=t(item.nameKey);document.getElementById('modal-farm').textContent='🏡 '+item.farm;document.getElementById('modal-base-price').textContent='₹'+item.price+'/kg';document.getElementById('modal-qty-title').textContent=t('chooseQty');document.getElementById('modal-confirm').textContent='+ '+t('addToCart');document.getElementById('modal-confirm').classList.remove('ready');const qtys=[{key:'bag',icon:'👜',mult:1},{key:'crate',icon:'📦',mult:5},{key:'bundle',icon:'🎁',mult:10}];document.getElementById('qty-grid').innerHTML=qtys.map(q=>`<div class="qty-card" id="qc-${q.key}" onclick="selectQty('${q.key}',${q.mult})"><span class="qty-card-icon">${q.icon}</span><span class="qty-card-label">${t(q.key)}</span><span class="qty-card-amount">${q.mult===1?'1 kg':q.mult===5?'5 kg':'10 kg'}</span><span class="qty-card-price">₹${item.price*q.mult}</span></div>`).join('');document.getElementById('modal-overlay').classList.add('open');}
function selectQty(key,mult){selectedQtyKey=key;document.querySelectorAll('.qty-card').forEach(c=>c.classList.remove('selected'));document.getElementById('qc-'+key).classList.add('selected');document.getElementById('modal-confirm').classList.add('ready');document.getElementById('modal-confirm').textContent=`+ ${t('addToCart')} · ₹${modalItem.price*mult}`;}
function confirmAdd(){if(!modalItem||!selectedQtyKey)return;cart[modalItem.id]=(cart[modalItem.id]||0)+1;updateNavBadge();closeQtyModal();showToast(`✅ ${t(modalItem.nameKey)} added!`);render();}
function closeQtyModal(){document.getElementById('modal-overlay').classList.remove('open');modalItem=null;selectedQtyKey=null;}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeQtyModal();}
function addToCartDirect(itemId){cart[itemId]=(cart[itemId]||0)+1;const item=marketItems.find(i=>i.id===itemId);updateNavBadge();showToast(`✅ ${t(item.nameKey)} added!`);render();}
function changeQty(itemId,delta){const n=(cart[itemId]||0)+delta;if(n<=0)delete cart[itemId];else cart[itemId]=n;updateNavBadge();render();}
function handleSearch(val){searchQ=val;render();}
function setFilter(cat){filterCat=cat;render();}
function toggleSub(farmId){subscribed[farmId]=!subscribed[farmId];const farm=farms.find(f=>f.id===farmId);if(subscribed[farmId])showToast(`🌿 Subscribed to ${farm.name}!`);render();}
function render(){const el=document.getElementById('content');if(view==='farmer')el.innerHTML=renderFarmer();else if(activeTab==='explore')el.innerHTML=renderConsumerExplore();else if(activeTab==='farms')el.innerHTML=renderFarms();else if(activeTab==='cart')el.innerHTML=renderCart();attachHandlers();animateProgressBars();}
function renderFarmer(){const maxBar=Math.max(...weeklyData);return`<div class="farmer-profile fade-up"><div class="farmer-avatar">👨‍🌾</div><div style="flex:1"><div class="farmer-name">${t('farmName')}</div><div class="farmer-loc">📍 ${t('location')}</div><div class="farmer-badges"><span class="f-badge f-badge-v">✓ ${t('verifiedFarm')}</span><span class="f-badge f-badge-o">🌿 ${t('organic')}</span></div></div></div><div class="stats-row fade-up" style="animation-delay:.05s"><div class="stat-card" style="border-color:rgba(212,162,0,.35)"><span class="stat-emoji">💰</span><span class="stat-value" style="color:#d4a200">₹4,280</span><span class="stat-label">${t('totalEarnings')}</span><span class="stat-sub">+12% ↑</span></div><div class="stat-card" style="border-color:rgba(39,174,96,.35)"><span class="stat-emoji">📦</span><span class="stat-value" style="color:#27ae60">12</span><span class="stat-label">${t('ordersToday')}</span><span class="stat-sub">+3 pending</span></div><div class="stat-card" style="border-color:rgba(52,152,219,.35)"><span class="stat-emoji">⭐</span><span class="stat-value" style="color:#3498db">4.8</span><span class="stat-label">${t('rating')}</span><span class="stat-sub">142 reviews</span></div></div><div class="earnings-bar fade-up" style="animation-delay:.1s"><div class="earnings-bar-header"><span class="earnings-bar-title">📈 ${t('weeklyTarget')}</span><span class="earnings-pct">71%</span></div><div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div><div class="earnings-footer"><span>₹4,280 earned</span><span>₹6,000 goal</span></div></div><div class="chart-wrap fade-up" style="animation-delay:.13s"><div class="chart-title">📊 ${t('weeklyEarnings')}</div><div class="chart-bars">${weeklyData.map((v,i)=>`<div class="chart-bar-wrap"><div class="chart-bar ${i===5?'today':''}" style="height:${Math.round(v/maxBar*100)}%;min-height:6px"></div><span class="chart-day">${weekDays[i]}</span></div>`).join('')}</div></div><div class="section-hdr fade-up" style="animation-delay:.15s"><span class="section-title">📊 ${t('analytics')}</span></div><div class="analytics-row fade-up" style="animation-delay:.17s"><div class="analytics-card"><div class="analytics-label">👥 Reach</div><div class="analytics-value">1,284</div><div class="analytics-change up">▲ 18% this week</div></div><div class="analytics-card"><div class="analytics-label">🔁 Repeat Buyers</div><div class="analytics-value">68%</div><div class="analytics-change up">▲ 5%</div></div><div class="analytics-card"><div class="analytics-label">💸 Avg. Order</div><div class="analytics-value">₹357</div><div class="analytics-change down">▼ 2%</div></div><div class="analytics-card"><div class="analytics-label">📦 Unsold Stock</div><div class="analytics-value">23kg</div><div class="analytics-change up">▲ Better</div></div></div><div class="voice-section fade-up" style="animation-delay:.2s"><button class="voice-btn" id="voice-btn" onclick="toggleVoice()"><div class="voice-ripple" style="display:none"></div><div class="voice-ripple voice-ripple2" style="display:none"></div><span id="voice-icon" class="voice-icon">🎤</span><span id="voice-label" class="voice-label">${t('tapToSpeak')}</span></button></div><div class="section-hdr fade-up" style="animation-delay:.22s"><span class="section-title">⚡ ${t('quickActions')}</span></div><div class="quick-actions fade-up" style="animation-delay:.24s"><button class="quick-btn" onclick="showToast('📦 Add product form')"><span class="quick-btn-icon">➕</span><div><div class="quick-btn-text">${t('addNewProduct')}</div><div class="quick-btn-sub">List new crop</div></div></button><button class="quick-btn" onclick="showToast('📋 12 orders pending')"><span class="quick-btn-icon">📋</span><div><div class="quick-btn-text">${t('viewOrders')}</div><div class="quick-btn-sub">12 pending</div></div></button><button class="quick-btn" onclick="showToast('💰 Price editor')"><span class="quick-btn-icon">💰</span><div><div class="quick-btn-text">${t('updatePrices')}</div><div class="quick-btn-sub">Bulk update</div></div></button><button class="quick-btn" onclick="showToast('📊 Generating report...')"><span class="quick-btn-icon">📊</span><div><div class="quick-btn-text">${t('downloadReport')}</div><div class="quick-btn-sub">Weekly PDF</div></div></button></div><div class="section-hdr fade-up" style="animation-delay:.26s"><span class="section-title">🌿 ${t('myListings')}</span><button class="add-btn" onclick="showToast('➕ Add new product')">+ ${t('addProduct')}</button></div><div class="product-list">${farmerProducts.map((p,i)=>renderProductCard(p,i)).join('')}</div>`;}
function renderProductCard(p,i){const soldPct=Math.min(100,Math.round(p.sold/(p.sold+p.stock)*100));const isLow=p.status==='lowStock';return`<div class="product-card fade-up" style="animation-delay:${.28+i*.06}s"><div class="product-emoji-box" style="background:${p.color}22"><span>${p.emoji}</span></div><div class="product-info"><div style="display:flex;align-items:center;justify-content:space-between"><span class="product-name">${t(p.nameKey)}</span>${p.organic?`<span style="font-size:9px;background:rgba(74,158,63,.2);color:#4a9e3f;border-radius:99px;padding:2px 7px;font-weight:800">🌿</span>`:''}</div><div class="product-meta"><span class="stock-badge ${isLow?'stock-low':'stock-in'}">${isLow?t('lowStock'):t('inStock')}</span><span class="product-price">₹${p.price}/${p.unit}</span></div><div class="mini-track"><div class="mini-fill" id="mini-${p.id}" style="width:0;background:${p.color}"></div></div><div class="prod-stats"><span class="prod-stat">📦 ${p.stock}${p.unit}</span><span class="prod-stat">✅ ${p.sold} ${t('sold')}</span></div><div class="prod-actions"><button class="prod-action-btn edit" onclick="showToast('✏️ Editing')">✏️ ${t('editListing')}</button><button class="prod-action-btn pause" onclick="showToast('⏸️ Paused')">⏸️ ${t('pauseListing')}</button></div></div></div>`;}
function renderConsumerExplore(){const filtered=marketItems.filter(item=>{const matchCat=filterCat==='all'||item.category===filterCat;const q=searchQ.toLowerCase();const matchQ=!q||t(item.nameKey).toLowerCase().includes(q)||item.farm.toLowerCase().includes(q);return matchCat&&matchQ;});return`<div class="search-bar fade-up"><span style="font-size:18px">🔍</span><input class="search-input" placeholder="${t('searchHint')}" value="${searchQ}" id="search-input" oninput="handleSearch(this.value)"/>${searchQ?`<button class="search-clear" onclick="handleSearch('');document.getElementById('search-input').value=''">✕</button>`:''}</div><div class="filter-row fade-up" style="animation-delay:.05s">${[{key:'all',icon:'🌐'},{key:'vegetables',icon:'🥦'},{key:'fruits',icon:'🍎'},{key:'grains',icon:'🌾'}].map(f=>`<button class="filter-pill ${filterCat===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.icon} ${t(f.key)}</button>`).join('')}</div><div class="hero-banner fade-up" style="animation-delay:.08s"><div class="hero-inner"><span style="font-size:40px">🌿</span><div><div class="hero-title">⚡ ${t('fresh')}</div><div class="hero-sub">${t('localFarm')} · ${t('organic')}</div></div></div><span class="hero-emojis">🥕🍅🌽</span></div><div class="section-hdr fade-up" style="animation-delay:.1s"><span class="section-title">🛒 ${t('marketplace')}</span><span class="section-sub">${filtered.length} items</span></div><div class="market-grid">${filtered.length===0?`<div class="empty-state"><div class="empty-state-icon">🌱</div><div class="empty-state-text">${t('noResults')}</div></div>`:filtered.map((item,i)=>renderMarketCard(item,i)).join('')}</div><div class="section-hdr fade-up" style="margin-top:18px"><span class="section-title">🔥 ${t('trending')}</span></div><div style="overflow-x:auto;display:flex;gap:10px;padding-bottom:4px;scrollbar-width:none">${farmerProducts.slice(0,4).map(p=>`<div style="min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;flex-shrink:0"><div style="font-size:32px">${p.emoji}</div><div style="font-size:12px;font-weight:700;color:var(--text);margin-top:4px">${t(p.nameKey)}</div><div style="font-size:11px;color:var(--gold);font-weight:800;margin-top:3px">₹${p.price}/kg</div></div>`).join('')}</div>`;}
function renderMarketCard(item,i){const inCart=cart[item.id]||0;return`<div class="market-card fade-up" style="animation-delay:${.12+i*.06}s">${item.freshBadge?`<div class="fresh-badge">⚡ ${t('fresh')}</div>`:''} ${item.organic?`<div class="organic-badge">🌿</div>`:''}<div class="market-emoji-box" onclick="openQtyModal(${item.id})">${item.emoji}</div><div class="market-body"><div class="market-name">${t(item.nameKey)}</div><div class="market-farm">🏡 ${item.farm}</div><div class="market-price-row"><span class="market-price">₹${item.price}<span>${t('perKg')}</span></span><button class="add-cart-btn ${inCart>0?'in-cart':''}" onclick="addToCartDirect(${item.id})">${inCart>0?`✓ ${inCart}`:`+ ${t('addToCart')}`}</button></div></div></div>`;}
function renderFarms(){return`<div class="section-hdr fade-up"><span class="section-title">🗺️ ${t('nearbyFarms')}</span><span class="section-sub">${farms.length} farms</span></div>${farms.map((farm,i)=>`<div class="farm-card fade-up" style="animation-delay:${i*.08}s"><div class="farm-card-top"><div class="farm-emoji-box">${farm.emoji}</div><div class="farm-info"><div class="farm-name">${farm.name} ${farm.verified?`<span class="verified-badge">✓</span>`:''}</div><div class="farm-loc">📍 ${farm.location} · ${farm.dist} ${t('km')}</div><div class="farm-rating">${'⭐'.repeat(Math.round(farm.rating))} ${farm.rating}</div><div class="farm-subs">👥 ${farm.subscribers}</div></div><button class="sub-btn ${subscribed[farm.id]?'active':''}" onclick="toggleSub(${farm.id})">${subscribed[farm.id]?t('subscribed'):t('subscribe')}</button></div><div class="farm-products">${farm.products.map(p=>`<span class="farm-prod-emoji">${p}</span>`).join('')}</div><div class="farm-tags">${farm.tags.map(tag=>`<span class="farm-tag">${tag==='organic'?'🌿 ':'⚡ '}${t(tag)||tag}</span>`).join('')}</div></div>`).join('')}`;} 
function renderCart(){const cartItems=Object.entries(cart).filter(([,qty])=>qty>0);if(cartItems.length===0)return`<div class="cart-empty fade-up"><div class="cart-empty-icon">🌱</div><div class="cart-empty-text">${t('emptyCart')}</div><div style="font-size:12px;margin-top:8px;color:var(--greenDim)">${t('addItemsHint')}</div><button onclick="showTab('explore')" style="margin-top:18px;background:var(--green);border:none;border-radius:12px;padding:10px 24px;color:#fff;font-weight:800;font-size:13px;cursor:pointer">🛒 ${t('explore')}</button></div>`;return`<div class="section-hdr fade-up"><span class="section-title">🛒 ${t('cart')}</span><span class="section-sub">${cartItems.length} items</span></div>${cartItems.map(([id,qty],i)=>{const item=marketItems.find(i=>i.id===parseInt(id));if(!item)return'';return`<div class="cart-item fade-up" style="animation-delay:${i*.06}s"><span class="cart-item-emoji">${item.emoji}</span><div class="cart-item-info"><div class="cart-item-name">${t(item.nameKey)}</div><div class="cart-item-sub">🏡 ${item.farm} · ₹${item.price}/kg</div></div><div class="cart-item-qty"><button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty(${item.id},1)">+</button></div><div class="cart-item-price">₹${item.price*qty}</div></div>`;}).join('')}<div class="cart-total fade-up"><span class="cart-total-label">💰 ${t('total')}</span><span class="cart-total-val">₹${cartValue().toLocaleString()}</span></div><button class="checkout-btn fade-up" onclick="showToast('🚚 Order placed! Delivery in 2-4hrs')">🚚 ${t('delivery')} — ${t('placeOrder')}</button>`;}
function animateProgressBars(){const pf=document.getElementById('prog-fill');if(pf)setTimeout(()=>{pf.style.width='71%';},80);farmerProducts.forEach(p=>{const el=document.getElementById('mini-'+p.id);if(el){const pct=Math.min(100,Math.round(p.sold/(p.sold+p.stock)*100));setTimeout(()=>{el.style.width=pct+'%';},100+p.id*60);}});}
function attachHandlers(){const si=document.getElementById('search-input');if(si&&document.activeElement!==si&&searchQ){si.focus();si.setSelectionRange(si.value.length,si.value.length);}}
render();
</script>
</body>
</html>
